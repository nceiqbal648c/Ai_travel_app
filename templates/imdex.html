<!DOCTYPE html>
<html>

<head>

    <title>AI Travel Anywhere</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            background:#050510;

            font-family:Arial;

            display:flex;
            justify-content:center;
            align-items:center;

            min-height:100vh;

            color:white;

        }

        .card{

            width:350px;

            background:#111122;

            border-radius:25px;

            padding:25px;

            box-shadow:
            0 0 20px cyan,
            0 0 40px #0077ff;

        }

        .logo{

            width:90px;
            height:90px;

            border-radius:50%;

            display:block;

            margin:auto;

            border:3px solid cyan;

            box-shadow:
            0 0 20px cyan;

        }

        h1{

            text-align:center;

            margin-top:15px;

            color:cyan;

            font-size:28px;

        }

        .subtitle{

            text-align:center;

            color:#aaaaaa;

            margin-top:8px;

            margin-bottom:25px;

        }

        .input-title{

            margin-bottom:10px;

            color:#00d9ff;

            font-size:18px;

        }

        input{

            width:100%;

            padding:15px;

            border:none;

            border-radius:14px;

            background:black;

            color:white;

            font-size:16px;

            outline:none;

        }

        .video-btn{

            width:100%;

            padding:15px;

            margin-top:20px;

            border:none;

            border-radius:15px;

            background:
            linear-gradient(
            45deg,
            #00c6ff,
            #0072ff
            );

            color:white;

            font-size:18px;

        }

        .mp3-btn{

            width:100%;

            padding:15px;

            margin-top:15px;

            border:none;

            border-radius:15px;

            background:
            linear-gradient(
            45deg,
            #ff00cc,
            #7b00ff
            );

            color:white;

            font-size:18px;

        }

        .status{

            margin-top:25px;

            background:#0a0a15;

            padding:15px;

            border-radius:15px;

            border:1px solid #222;

            text-align:center;

            color:#00ff99;

        }

        .footer{

            margin-top:20px;

            text-align:center;

            color:#777;

            font-size:14px;

        }

    </style>

</head>

<body>

    <div class="card">

        <img
        class="logo"
        src="https://i.imgur.com/8Km9tLL.png">

        <h1>
            AI Travel Anywhere
        </h1>

        <p class="subtitle">
            Builder Mode Activated
        </p>

        <div class="input-title">
            Paste Video Link
        </div>

        <input
        type="text"
        placeholder="Paste YouTube / Facebook / TikTok link">

        <button
        class="video-btn"

        onclick="videoDownload()">

            DOWNLOAD VIDEO

        </button>

        <button
        class="mp3-btn"

        onclick="mp3Download()">

            DOWNLOAD MP3

        </button>

        <div class="status">
            Server Online • Ready
        </div>

        <div class="footer">
            Powered by Flask + Termux
        </div>

    </div>

<script>

function videoDownload(){

    alert("Video Download Started 🚀")

}

function mp3Download(){

    alert("MP3 Download Started 🎵")

}

</script>

</body>

</html>
