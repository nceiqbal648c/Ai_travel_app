name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Java and Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk zip unzip libncurses6 libstdc++6 build-essential ccache git libffi-dev libssl-dev

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Fix Buildozer Entrypoint and Spec Header
        run: |
          python -c "
          import os
          filename = 'buildozer.spec'
          if os.path.exists(filename):
              with open(filename, 'r', encoding='utf-8') as f:
                  content = f.read()
              
              # প্রথম লাইনের সমস্যা ঠিক করা হচ্ছে
              lines = content.splitlines()
              lines[0] = '[app]'
              fixed_content = '\n'.join(lines)
              
              # বিল্ডোজারকে বলে দেওয়া হচ্ছে মেইন ফাইল app.py এবং আইকন নির্দিষ্ট করা হচ্ছে
              fixed_content = fixed_content.replace('source.include_exts = py,png,jpg,kv,atlas', 'source.include_exts = py,png,jpg,kv,atlas,html,txt')
              
              with open(filename, 'w', encoding='utf-8') as f:
                  f.write(fixed_content)
              print('buildozer.spec successfully optimized for app.py!')
          "

      - name: Build APK with app.py as Entrypoint
        run: |
          # বিল্ডোজারকে জোরপূর্বক app.py ফাইলকে মেইন ধরে রান করানো হচ্ছে
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AI_Travel_Anywhere_APK
          path: bin/*.apk
