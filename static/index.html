<style>
.container{
    animation:fadeIn 1.2s ease;
}
@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
.btn:hover{
    transform:translateY(-4px);

    background:rgba(255,255,255,0.14);

    box-shadow:
    0 0 25px rgba(255,140,0,.25);

    letter-spacing:1.5px;
}    to{
        opacity:1;
        transform:translateY(0);
    }
}

<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>SILENTTRAIL AI</title>

<style>


*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    background:
    linear-gradient(rgba(0,0,0,.65), rgba(0,0,0,.75)),
    url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=1400');
    background-size:cover;
    background-position:center;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.container{
    width:90%;
    max-width:420px;
    padding:30px;
    border-radius:28px;

    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(14px);

    border:1px solid rgba(255,255,255,0.12);

    box-shadow:
    0 8px 32px rgba(0,0,0,.4);
backdrop-filter:blur(18px);
-webkit-backdrop-filter:blur(18px);}

.logo{
    text-align:center;
    margin-bottom:40px;
}

.logo h1{
    color:white;
    font-size:34px;
    letter-spacing:2px;
}

.logo p{
    color:#d0d0d0;
    margin-top:8px;
    font-size:14px;
    letter-spacing:1px;
}

.buttons{
    display:flex;
    flex-direction:column;
    gap:18px;
}

.btn{
    padding:18px;
    border:none;
    border-radius:18px;

    background:rgba(255,255,255,0.08);

    color:white;
    font-size:16px;
    letter-spacing:1px;

    cursor:pointer;


    transition:.3s;
position:relative;
overflow:hidden;

}

.btn:active{
    transform:scale(0.97);
}

.btn:hover{
    transform:translateY(-3px);

    background:rgba(255,255,255,0.14);

    box-shadow:
    0 0 18px rgba(255,255,255,.15);
}

.footer{
    text-align:center;
    margin-top:35px;
    color:#bdbdbd;
    font-size:12px;
    letter-spacing:1px;
}

</style>
</head>

<body>

<div class="container">

    <div class="logo">
        <h1>SILENTTRAIL AI</h1>
        <p>Created by Iqbal Ahmed</p>
    </div>

    <div class="buttons">

        <button class="btn">
            CREATE STORY
        </button>

        <button class="btn">
            GENERATE CAPTION
        </button>

        <button class="btn">
            EXPORT REEL
        </button>

        <button class="btn">
            DOWNLOAD MEDIA
        </button>

    </div>

    </div>

</html>
