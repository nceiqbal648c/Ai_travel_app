name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Java and Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk zip unzip libncurses6 libstdc++6 build-essential ccache git libffi-dev libssl-dev

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Build APK with app.py as Entrypoint
        run: |
          # বিল্ডোজার রান করার আগে app.py কে মেইন এন্ট্রি হিসেবে সার্ভারে কনফিগার করা হলো
          export P4A_android_entrypoint=app.py
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AI_Travel_Anywhere_APK
          path: bin/*.apk
