<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Travel Anywhere</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="bg-blur-overlay"></div>
    <div class="app-container">
        <header class="app-header">
            <div class="logo-area">
                <i class="fa-solid fa-compass fa-spin" style="color: #38bdf8;"></i>
                <h1>Engine Dashboard</h1>
            </div>
            <span class="status-badge"><span class="dot"></span> Live Engine</span>
        </header>
        <div class="profile-card">
            <div class="profile-info">
                <h2>@ia.travelanywhere</h2>
                <p class="tagline">Digital Travel Platform & Creator</p>
                <div class="divider"></div>
                <p class="bio">"TRAVEL EVERYWHERE, CONNECT EVERY HEART"</p>
            </div>
        </div>
        <main class="main-content">
            <section class="content-section">
                <h3><i class="fa-solid fa-folder-open"></i> আমার ট্রাভেল ফাইলসমূহ</h3>
                <div class="file-grid">
                    <div class="file-card">
                        <div class="file-icon"><i class="fa-solid fa-file-code"></i></div>
                        <div class="file-info">
                            <h4>Core Engine</h4>
                            <p>app.py (Active)</p>
                        </div>
                    </div>
                    <div class="file-card">
                        <div class="file-icon"><i class="fa-solid fa-images"></i></div>
                        <div class="file-info">
                            <h4>Media Assets</h4>
                            <p>static/images</p>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
