name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Java and Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk zip unzip libncurses6 libstdc++6
          # অতিরিক্ত ডিপেন্ডেন্সি যা বিল্ডোজার ব্যাকএন্ডের জন্য প্রয়োজন হতে পারে
          sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Auto-Fix Buildozer Spec File
        run: |
          if [ -f buildozer.spec ]; then
            echo "Fixing buildozer.spec file header..."
            sed -i '1s/.*/\[app\]/' buildozer.spec
          else
            echo "buildozer.spec not found, creating a default one..."
            buildozer init
          fi

      - name: Build APK
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AI_Travel_Anywhere_APK
          path: bin/*.apk
